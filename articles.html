<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Articles — Football Forte</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=IBM+Plex+Mono:wght@400;500&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#f8f8f6;--surface:#ffffff;--surface2:#f2f2f0;--border:#e0e0dc;
      --text:#0a0a0a;--muted:#888880;--faint:#c8c8c4;
      --font-head:'Barlow Condensed',sans-serif;
      --font-body:'Barlow',sans-serif;
      --font-mono:'IBM Plex Mono',monospace;
    }
    body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.6;min-height:100vh}
    nav{background:rgba(248,248,246,0.97);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:200;backdrop-filter:blur(8px)}
    .nav-right{display:flex;align-items:center;gap:12px}
    .btn-sm{font-family:var(--font-mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:7px 16px;border-radius:3px;cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-block}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);display:flex;flex-direction:column;align-items:center;line-height:1.1}
    .btn-ghost:hover{border-color:var(--text);color:var(--text)}
    .btn-solid{background:var(--text);border:1px solid var(--text);color:#fff;font-weight:600}
    .btn-solid:hover{opacity:0.8}
    .hamburger{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;gap:5px;padding:4px}
    .hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:all 0.2s}
    .hamburger:hover span{background:var(--muted)}
    .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.2);z-index:300;opacity:0;pointer-events:none;transition:opacity 0.25s}
    .sidebar-overlay.open{opacity:1;pointer-events:all}
    .sidebar-drawer{position:fixed;top:0;left:-280px;width:280px;height:100vh;background:var(--surface);border-right:1px solid var(--border);z-index:400;transition:left 0.25s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column}
    .sidebar-drawer.open{left:0}
    .sidebar-top{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .sidebar-close{background:none;border:none;cursor:pointer;font-family:var(--font-mono);font-size:18px;color:var(--muted);line-height:1}
    .sidebar-close:hover{color:var(--text)}
    .sidebar-nav{padding:1rem 0;flex:1}
    .sidebar-link{display:block;font-family:var(--font-mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:0.9rem 1.5rem;border-bottom:1px solid var(--border);transition:all 0.15s}
    .sidebar-link:hover,.sidebar-link.active{color:var(--text);background:var(--bg)}
    .sidebar-label{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);padding:1rem 1.5rem 0.5rem}
    .filter-bar{padding:1rem 2rem;border-bottom:1px solid var(--border);max-width:1200px;margin:0 auto;display:flex;gap:0.6rem;flex-wrap:wrap}
    .filter-btn{font-family:var(--font-mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s}
    .filter-btn:hover{border-color:var(--text);color:var(--text)}
    .filter-btn.active{background:var(--text);border-color:var(--text);color:#fff}
    .content{max-width:1200px;margin:0 auto;padding:2rem}
    .empty-state{font-family:var(--font-mono);font-size:11px;color:var(--faint);letter-spacing:1px;text-transform:uppercase;padding:3rem 0}
    footer{border-top:1px solid var(--border);padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
    .footer-copy{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
    .footer-links{display:flex;gap:1.5rem}
    .footer-links a{font-family:var(--font-mono);font-size:10px;color:var(--muted);text-decoration:none;text-transform:uppercase;letter-spacing:1px}
    .footer-links a:hover{color:var(--text)}
  </style>
</head>
<body>

<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="sidebar-drawer" id="drawer">
  <div class="sidebar-top">
    <svg height="28" viewBox="0 0 320 50" aria-label="Football Forte">
      <style>.lcs{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:38px;fill:#0a0a0a}</style>
      <text x="4" y="42" class="lcs">F</text><text x="24" y="42" class="lcs">ootball</text>
      <text x="178" y="42" class="lcs">F</text><text x="198" y="42" class="lcs">orte</text>
      <line x1="5" y1="14" x2="268" y2="14" stroke="#0a0a0a" stroke-width="1.5"/>
      <ellipse cx="283" cy="14" rx="15" ry="10" fill="#ffffff" stroke="#0a0a0a" stroke-width="1.5"/>
      <line x1="268" y1="14" x2="298" y2="14" stroke="#0a0a0a" stroke-width="1"/>
      <line x1="277" y1="8" x2="277" y2="20" stroke="#0a0a0a" stroke-width="1"/>
      <line x1="283" y1="6" x2="283" y2="22" stroke="#0a0a0a" stroke-width="1"/>
      <line x1="289" y1="8" x2="289" y2="20" stroke="#0a0a0a" stroke-width="1"/>
    </svg>
    <button class="sidebar-close" onclick="closeSidebar()">✕</button>
  </div>
  <div class="sidebar-nav">
    <div class="sidebar-label">Navigation</div>
    <a href="index.html" class="sidebar-link">Betting Model</a>
    <a href="#" class="sidebar-link">Rookie Model</a>
    <a href="#" class="sidebar-link">Dynasty Tools</a>
    <a href="articles.html" class="sidebar-link active">Articles</a>
  </div>
</div>

<nav>
  <div style="display:flex;align-items:center;gap:1rem">
    <button class="hamburger" onclick="openSidebar()" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
    <svg height="36" viewBox="0 0 320 50" style="display:block" aria-label="Football Forte">
      <style>.lcn{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:38px;fill:#0a0a0a}</style>
      <text x="4" y="42" class="lcn">F</text><text x="24" y="42" class="lcn">ootball</text>
      <text x="178" y="42" class="lcn">F</text><text x="198" y="42" class="lcn">orte</text>
      <line x1="5" y1="14" x2="268" y2="14" stroke="#0a0a0a" stroke-width="1.5"/>
      <ellipse cx="283" cy="14" rx="15" ry="10" fill="#f8f8f6" stroke="#0a0a0a" stroke-width="1.5"/>
      <line x1="268" y1="14" x2="298" y2="14" stroke="#0a0a0a" stroke-width="1"/>
      <line x1="277" y1="8" x2="277" y2="20" stroke="#0a0a0a" stroke-width="1"/>
      <line x1="283" y1="6" x2="283" y2="22" stroke="#0a0a0a" stroke-width="1"/>
      <line x1="289" y1="8" x2="289" y2="20" stroke="#0a0a0a" stroke-width="1"/>
    </svg>
  </div>
  <div class="nav-right">
    <a href="#" class="btn-sm btn-ghost">Sign<br>in</a>
    <a href="#" class="btn-sm btn-solid">Join Free</a>
  </div>
</nav>

<div class="filter-bar">
  <button class="filter-btn active">All</button>
  <button class="filter-btn">Model Update</button>
  <button class="filter-btn">Analysis</button>
  <button class="filter-btn">Betting</button>
  <button class="filter-btn">Dynasty</button>
</div>

<div class="content">
  <div class="empty-state">No articles yet — check back soon.</div>
</div>

<footer>
  <div class="footer-copy">© 2025 footballforte.com — For entertainment purposes</div>
  <div class="footer-links">
    <a href="#">Discord</a>
    <a href="#">Twitter / X</a>
    <a href="#">Methodology</a>
  </div>
</footer>

<script>
  function openSidebar(){
    document.getElementById('drawer').classList.add('open');
    document.getElementById('overlay').classList.add('open');
  }
  function closeSidebar(){
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }

  const filterBtns = document.querySelectorAll('.filter-btn');
  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
</script>

</body>
</html>
