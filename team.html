<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Profile — Football Forte</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=IBM+Plex+Mono:wght@400;500&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#f8f8f6;--surface:#ffffff;--surface2:#f2f2f0;--border:#e0e0dc;--text:#0a0a0a;--muted:#888880;--faint:#c8c8c4;--font-head:'Barlow Condensed',sans-serif;--font-body:'Barlow',sans-serif;--font-mono:'IBM Plex Mono',monospace;}
    body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.6;min-height:100vh}
    nav{background:rgba(248,248,246,0.97);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:200;backdrop-filter:blur(8px)}
    .hamburger{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;gap:5px;padding:4px}
    .hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px}
    .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.2);z-index:300;opacity:0;pointer-events:none;transition:opacity 0.25s}
    .sidebar-overlay.open{opacity:1;pointer-events:all}
    .sidebar-drawer{position:fixed;top:0;left:-280px;width:280px;height:100vh;background:var(--surface);border-right:1px solid var(--border);z-index:400;transition:left 0.25s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column}
    .sidebar-drawer.open{left:0}
    .sidebar-top{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .sidebar-close{background:none;border:none;cursor:pointer;font-family:var(--font-mono);font-size:18px;color:var(--muted);line-height:1}
    .sidebar-nav{padding:1rem 0;flex:1}
    .sidebar-link{display:block;font-family:var(--font-mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:0.9rem 1.5rem;border-bottom:1px solid var(--border);transition:all 0.15s}
    .sidebar-link:hover,.sidebar-link.active{color:var(--text);background:var(--bg)}
    .sidebar-label{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--faint);padding:1rem 1.5rem 0.5rem}
    .page-wrap{max-width:860px;margin:0 auto;padding:3rem 2rem}
    .back-link{font-family:var(--font-mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;gap:6px;margin-bottom:2rem;transition:color 0.2s}
    .back-link:hover{color:var(--text)}
    .team-tag{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem}
    .team-name{font-family:var(--font-head);font-size:56px;font-weight:900;text-transform:uppercase;letter-spacing:-1px;line-height:0.95;color:var(--text);margin-bottom:1.5rem}
    .team-header{margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
    .rank-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:2.5rem}
    .rank-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:1.25rem;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
    .rank-card-label{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem}
    .rank-card-num{font-family:var(--font-head);font-size:48px;font-weight:900;line-height:1;color:var(--text)}
    .rank-card-trend{font-family:var(--font-mono);font-size:10px;font-weight:600;margin-top:4px}
    .trend-up{color:#2a9d5c}
    .trend-down{color:#e55}
    .trend-same{color:var(--faint)}
    .section-title{font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
    .grades-table{width:100%;border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:2.5rem}
    .grades-header{display:grid;grid-template-columns:1fr 100px 100px 100px;background:var(--surface2);border-bottom:1px solid var(--border)}
    .gh-cell{font-family:var(--font-mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:8px 16px;display:flex;align-items:center;justify-content:center}
    .gh-cell:first-child{justify-content:flex-start}
    .grade-row{display:grid;grid-template-columns:1fr 100px 100px 100px;border-bottom:1px solid var(--border);background:var(--surface);height:44px;transition:background 0.15s}
    .grade-row:last-child{border-bottom:none}
    .grade-row:hover{background:var(--surface2)}
    .gc-cell{display:flex;align-items:center;justify-content:center;height:100%;padding:0 16px}
    .gc-cell:first-child{justify-content:flex-start}
    .pos-label{font-family:var(--font-head);font-size:16px;font-weight:700;text-transform:uppercase;color:var(--text)}
    .grade-val{font-family:var(--font-mono);font-size:13px;font-weight:500;color:var(--text)}
    .grade-val.empty{color:var(--faint)}
    .change-box{display:flex;align-items:center;justify-content:center;gap:0;width:100%}
    .change-num-box{width:28px;display:flex;align-items:center;justify-content:center}
    .change-trend-box{width:28px;display:flex;align-items:center;justify-content:flex-start}
    .change-num{font-family:var(--font-mono);font-size:11px;color:var(--text)}
    .change-trend{font-family:var(--font-mono);font-size:9px;font-weight:600}
    .change-trend.up{color:#2a9d5c}
    .change-trend.down{color:#e55}
    .change-trend.same{color:var(--faint)}
    .loading{font-family:var(--font-mono);font-size:11px;color:var(--muted);padding:2rem;text-align:center;letter-spacing:1px;text-transform:uppercase}
    footer{border-top:1px solid var(--border);padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-top:3rem}
    .footer-copy{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
    .footer-links{display:flex;gap:1.5rem}
    .footer-links a{font-family:var(--font-mono);font-size:10px;color:var(--muted);text-decoration:none;text-transform:uppercase;letter-spacing:1px}

    @media(max-width:768px){
      nav{padding:0 1rem}
      .page-wrap{padding:2rem 1rem}
      .rankings-table{overflow-x:auto}
      .table-header,.table-row,.grades-header,.grade-row{min-width:500px}
      .rank-cards{grid-template-columns:1fr 1fr 1fr}
      .team-name{font-size:36px}
    }
    @media(max-width:480px){
      .rank-cards{grid-template-columns:1fr}
      .team-name{font-size:28px}
      .sort-tabs{flex-wrap:wrap}
    }
  </style>
</head>
<body>
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="sidebar-drawer" id="drawer">
  <div class="sidebar-top">
    <img src="logo.jpeg" alt="Football Forte" style="height:28px;display:block">
    <button class="sidebar-close" onclick="closeSidebar()">✕</button>
  </div>
  <div class="sidebar-nav">
    <div class="sidebar-label">Navigation</div>
    <a href="index.html" class="sidebar-link">Home</a>
    <a href="articles.html" class="sidebar-link">Articles</a>
    <a href="mock-draft-simulator.html" class="sidebar-link">Mock Draft Simulator</a>
    <a href="nfl-power-rankings.html" class="sidebar-link active">NFL Power Rankings</a>
  </div>
</div>
<nav>
  <div style="display:flex;align-items:center;gap:1rem">
    <button class="hamburger" onclick="openSidebar()"><span></span><span></span><span></span></button>
    <img src="logo.jpeg" alt="Football Forte" style="height:36px;display:block">
  </div>
</nav>
<div class="page-wrap">
  <a href="nfl-power-rankings.html" class="back-link">← NFL Power Rankings</a>
  <div class="team-header">
    <div class="team-tag">NFL Team Profile · 2026 Season</div>
    <div class="team-name" id="team-name">Loading...</div>
  </div>
  <div class="rank-cards" id="rank-cards"></div>
  <div class="section-title">Positional Rankings</div>
  <div class="grades-table">
    <div class="grades-header">
      <div class="gh-cell">Position</div>
      <div class="gh-cell">2025</div>
      <div class="gh-cell">2026</div>
      <div class="gh-cell">Change</div>
    </div>
    <div id="grades-body"><div class="loading">Loading...</div></div>
  </div>
</div>
<footer>
  <div class="footer-copy">© 2025 footballforte.com</div>
  <div class="footer-links"><a href="index.html">Home</a><a href="articles.html">Articles</a></div>
</footer>
<script>
const RANKINGS_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vR0sKY8qaTQQFKLNfw4muWFb1ljhxZeCrD9XmHJZ5Y8dV2Vrpufh-cQt6Voyhj4TColptZVlqwypfHd/pub?gid=283281036&single=true&output=csv';
const GRADES_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vR0sKY8qaTQQFKLNfw4muWFb1ljhxZeCrD9XmHJZ5Y8dV2Vrpufh-cQt6Voyhj4TColptZVlqwypfHd/pub?gid=1781569902&single=true&output=csv';

function openSidebar(){document.getElementById('drawer').classList.add('open');document.getElementById('overlay').classList.add('open');}
function closeSidebar(){document.getElementById('drawer').classList.remove('open');document.getElementById('overlay').classList.remove('open');}

function parseCSV(text){
  const lines=text.trim().split('\n');
  const headers=lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
  return lines.slice(1).map(line=>{
    const vals=line.split(',').map(v=>v.trim().replace(/"/g,''));
    const obj={};
    headers.forEach((h,i)=>obj[h]=vals[i]||'');
    return obj;
  });
}

function getTrendHtml(val2025, val2026){
  const a=parseInt(val2025), b=parseInt(val2026);
  if(isNaN(a)||isNaN(b)) return '<span class="change-trend same">—</span>';
  const diff=a-b;
  if(diff>0) return `<span class="change-trend up">▲${diff}</span>`;
  if(diff<0) return `<span class="change-trend down">▼${Math.abs(diff)}</span>`;
  return '<span class="change-trend same">—</span>';
}

function rankCardTrend(current, previous){
  const c=parseInt(current), p=parseInt(previous);
  if(isNaN(c)||isNaN(p)) return '<span class="rank-card-trend trend-same">—</span>';
  const diff=p-c;
  if(diff>0) return `<span class="rank-card-trend trend-up">▲${diff}</span>`;
  if(diff<0) return `<span class="rank-card-trend trend-down">▼${Math.abs(diff)}</span>`;
  return '<span class="rank-card-trend trend-same">—</span>';
}

const positions=[
  {label:'QB',key2025:'QB 2025',key2026:'QB 2026'},
  {label:'RB',key2025:'RB 2025',key2026:'RB 2026'},
  {label:'WR',key2025:'WR 2025',key2026:'WR 2026'},
  {label:'TE',key2025:'TE 2025',key2026:'TE 2026'},
  {label:'OL',key2025:'OL 2025',key2026:'OL 2026'},
  {label:'DL',key2025:'DL 2025',key2026:'DL 2026'},
  {label:'LB',key2025:'LB 2025',key2026:'LB 2026'},
  {label:'DB',key2025:'DB 2025',key2026:'DB 2026'},
];

async function init(){
  const params=new URLSearchParams(window.location.search);
  const teamName=params.get('team');
  if(!teamName){document.getElementById('team-name').textContent='Team not found';return;}
  document.getElementById('team-name').textContent=decodeURIComponent(teamName);
  document.title=decodeURIComponent(teamName)+' — Football Forte';

  try{
    const [rankResp, gradeResp]=await Promise.all([fetch(RANKINGS_URL),fetch(GRADES_URL)]);
    const rankData=parseCSV(await rankResp.text());
    const gradeData=parseCSV(await gradeResp.text());

    const teamRank=rankData.find(r=>r['Team']===decodeURIComponent(teamName));
    const teamGrade=gradeData.find(r=>r['Team']===decodeURIComponent(teamName));

    // Render rank cards
    if(teamRank){
      document.getElementById('rank-cards').innerHTML=`
        <div class="rank-card"><div class="rank-card-label">Overall</div><div class="rank-card-num">${teamRank['Overall Rank']||'—'}</div>${rankCardTrend(teamRank['Overall Rank'],teamRank['Overall Previous'])}</div>
        <div class="rank-card"><div class="rank-card-label">Offense</div><div class="rank-card-num">${teamRank['Offense Rank']||'—'}</div>${rankCardTrend(teamRank['Offense Rank'],teamRank['Offense Previous'])}</div>
        <div class="rank-card"><div class="rank-card-label">Defense</div><div class="rank-card-num">${teamRank['Defense Rank']||'—'}</div>${rankCardTrend(teamRank['Defense Rank'],teamRank['Defense Previous'])}</div>`;
    }

    // Render positional grades
    if(teamGrade){
      document.getElementById('grades-body').innerHTML=positions.map(pos=>{
        const v25=teamGrade[pos.key2025]||'';
        const v26=teamGrade[pos.key2026]||'';
        return `<div class="grade-row">
          <div class="gc-cell"><span class="pos-label">${pos.label}</span></div>
          <div class="gc-cell"><span class="grade-val${!v25?' empty':''}">${v25||'—'}</span></div>
          <div class="gc-cell"><span class="grade-val${!v26?' empty':''}">${v26||'—'}</span></div>
          <div class="gc-cell"><div class="change-box"><div class="change-num-box"></div><div class="change-trend-box">${getTrendHtml(v25,v26)}</div></div></div>
        </div>`;
      }).join('');
    } else {
      document.getElementById('grades-body').innerHTML='<div class="loading">No grade data available for this team yet.</div>';
    }
  }catch(e){
    document.getElementById('grades-body').innerHTML='<div class="loading">Could not load team data.</div>';
  }
}
init();
</script>
</body>
</html>
